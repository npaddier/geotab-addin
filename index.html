<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Quick Repair Add-in</title>
</head>
<body>
    <div id="quickRepairContent">
        <h1>Quick Repair Tool</h1>
        <p>If you see this text, the Add-in is loading correctly!</p>
    </div>

    <script>
        // Use the EXACT name from your config.json
        geotab.addin.QuickRepairAddin = function (api, state) {
            return {
                initialize: function (api, state, callback) {
                    console.log("Initializing Add-in...");
                    // This is the "on switch." Without it, the page stays blank.
                    callback();
                },
                focus: function (api, state) {
                    console.log("Add-in has focus");
                    // Place your Work Order logic here later
                },
                blur: function (api, state) {
                    console.log("User moved away");
                }
            };
        };
    </script>
</body>
</html>
